apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}-service
spec:
  selector:
    app: backend  # Doit correspondre exactement au label de ton Deployment
  ports:
    - protocol: TCP
      port: 80          # Port interne du service
      targetPort: 80    # Port du conteneur Nginx
      nodePort: {{ .Values.service.port }}   # Port d'accès sur ton Ubuntu
  type: NodePort